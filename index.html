<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
<meta name="theme-color" content="#1b1c20" />
<title>Resume Reader</title>
<style>
  :root {
    --bg: #1b1c20;
    --bar: #26282e;
    --bar-border: #34373f;
    --fg: #e7e8ea;
    --muted: #9aa0aa;
    --accent: #5b9cff;
    --accent-soft: rgba(91, 156, 255, 0.15);
    --viewer-bg: #0f1013;   /* margins around the page */
    --page-filter: none;    /* CSS filter applied to the rendered PDF page */
    --page-tint: transparent; /* warm wash multiplied over the page (sepia) */
    --reflow-bg: transparent;  /* paper colour behind reflowed text */
  }
  /* Sepia: warm paper tone for the page and a matching warm UI */
  body[data-theme="sepia"] {
    --bg: #d3c4a3;
    --bar: #c9b994;
    --bar-border: #b6a37c;
    --fg: #463a28;
    --muted: #7c6c4f;
    --accent: #9a6a3c;
    --accent-soft: rgba(154, 106, 60, 0.18);
    --viewer-bg: #c6b58f;
    --page-filter: sepia(0.2);
    --page-tint: #e4d4a8;   /* multiply over white → warm paper */
    --reflow-bg: #efe3c1;
  }
  /* Night: dark surroundings + inverted page so white sheets read as dark */
  body[data-theme="night"] {
    --bg: #0b0b0c;
    --bar: #161618;
    --bar-border: #2a2a2e;
    --fg: #d6d6d8;
    --muted: #7f8086;
    --accent: #5b9cff;
    --accent-soft: rgba(91, 156, 255, 0.15);
    --viewer-bg: #000;
    --page-filter: invert(1) hue-rotate(180deg);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; }

  /* ---- Top bar ---- */
  header {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 8px;
    padding: max(8px, env(safe-area-inset-top)) 10px 8px;
    background: var(--bar);
    border-bottom: 1px solid var(--bar-border);
    z-index: 20;
  }
  header .title {
    flex: 1 1 auto; min-width: 0;
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--fg);
  }
  header .title small { display: block; font-weight: 400; color: var(--muted); font-size: 11px; }
  button.icon {
    flex: 0 0 auto;
    background: transparent; border: 1px solid var(--bar-border);
    color: var(--fg); border-radius: 8px;
    width: 38px; height: 36px; font-size: 17px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  button.icon:active { background: var(--accent-soft); }
  button.primary {
    background: var(--accent); border: none; color: #fff;
    padding: 0 14px; height: 36px; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }

  /* ---- Viewer ---- */
  #viewer {
    flex: 1 1 auto; position: relative;
    overflow: auto; -webkit-overflow-scrolling: touch;
    display: flex; justify-content: center;
    background: var(--viewer-bg);
  }
  #pageHost { margin: auto; padding: 12px 0; position: relative; }
  /* warm wash laid over the page; multiply turns white paper sepia, keeps text dark */
  #pageHost::after {
    content: ""; position: absolute; left: 0; right: 0; top: 12px; bottom: 12px;
    background: var(--page-tint); mix-blend-mode: multiply;
    pointer-events: none; border-radius: 2px;
  }
  #canvas {
    display: block; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.45);
    border-radius: 2px; filter: var(--page-filter);
  }

  /* ---- Reflow (wrapping text) mode ---- */
  #reflowHost {
    max-width: 42rem; width: 100%;
    margin: 0 auto; padding: 20px 18px 60px;
    color: var(--fg); line-height: 1.65;
    font-size: 1.05rem;
    background: var(--reflow-bg);
    -webkit-text-size-adjust: none;
  }
  #reflowHost p { margin: 0 0 0.9em; hyphens: auto; }
  #reflowHost p.heading { font-weight: 700; margin-top: 1.2em; }
  #reflowHost .reflow-note {
    color: var(--muted); font-size: 12px; text-align: center;
    border-top: 1px solid var(--bar-border); margin-top: 28px; padding-top: 12px;
  }
  button.icon.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ---- Footer ---- */
  footer {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px max(8px, env(safe-area-inset-bottom));
    background: var(--bar); border-top: 1px solid var(--bar-border);
    z-index: 20;
  }
  footer input[type=range] { flex: 1 1 auto; accent-color: var(--accent); }
  footer .pageno { flex: 0 0 auto; font-size: 12px; color: var(--muted); min-width: 78px; text-align: right; font-variant-numeric: tabular-nums; }

  /* ---- Welcome overlay ---- */
  #welcome {
    position: absolute; inset: 0; z-index: 50;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; gap: 18px;
    background: radial-gradient(120% 120% at 50% 0%, #23252b 0%, var(--bg) 60%);
  }
  #welcome h1 { margin: 0; font-size: 22px; }
  #welcome p { margin: 0; color: var(--muted); max-width: 420px; line-height: 1.5; font-size: 14px; }
  #welcome .logo { font-size: 46px; }
  #resumeCard {
    margin-top: 6px; width: 100%; max-width: 420px;
    background: var(--bar); border: 1px solid var(--bar-border);
    border-radius: 12px; padding: 14px 16px; text-align: left;
    display: none;
  }
  #resumeCard .label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  #resumeCard .name { font-weight: 600; margin: 3px 0 2px; word-break: break-word; }
  #resumeCard .where { font-size: 13px; color: var(--accent); }

  /* ---- Toast ---- */
  #toast {
    position: absolute; left: 50%; bottom: 72px; transform: translateX(-50%) translateY(20px);
    background: #000; color: #fff; padding: 9px 16px; border-radius: 20px;
    font-size: 13px; opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 40;
    box-shadow: 0 6px 20px rgba(0,0,0,.5);
  }
  #toast.show { opacity: .95; transform: translateX(-50%) translateY(0); }

  .hidden { display: none !important; }
  #spinner {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 34px; height: 34px; border: 3px solid var(--bar-border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; z-index: 10; display: none;
  }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
</style>
</head>
<body>
  <header>
    <button class="icon" id="openBtn" title="Open PDF">📂</button>
    <div class="title" id="docTitle">Resume Reader<small id="docSub">no document open</small></div>
    <button class="icon" id="themeBtn" title="Reading theme">🌓</button>
    <button class="icon" id="reflowBtn" title="Reflow / wrapping text">¶</button>
    <button class="icon" id="zoomOut" title="Zoom out / smaller text">−</button>
    <button class="icon" id="zoomIn" title="Zoom in / bigger text">+</button>
    <button class="icon" id="fitBtn" title="Fit width">⤢</button>
  </header>

  <div id="viewer">
    <div id="pageHost"><canvas id="canvas"></canvas></div>
    <div id="reflowHost" class="hidden"></div>
    <div id="spinner"></div>

    <div id="welcome">
      <div class="logo">📖</div>
      <h1>Resume Reader</h1>
      <p>Open your PDF once and it picks up exactly where you left off — every time, automatically. Your file never leaves your device.</p>
      <button class="primary" id="welcomeOpen">Open a PDF</button>
      <div id="resumeCard">
        <div class="label">Continue reading</div>
        <div class="name" id="resumeName"></div>
        <div class="where" id="resumeWhere"></div>
      </div>
    </div>
  </div>

  <footer class="hidden" id="footer">
    <input type="range" id="slider" min="1" max="1" value="1" />
    <div class="pageno" id="pageNo">– / –</div>
  </footer>

  <input type="file" id="fileInput" accept="application/pdf,.pdf" class="hidden" />
  <div id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
  (function () {
    "use strict";

    if (!window.pdfjsLib) {
      document.getElementById("docSub").textContent = "failed to load PDF engine — check connection";
      return;
    }
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    // ---- DOM ----
    const $ = (id) => document.getElementById(id);
    const viewer = $("viewer"), canvas = $("canvas"), ctx = canvas.getContext("2d");
    const pageHost = $("pageHost"), reflowHost = $("reflowHost"), reflowBtn = $("reflowBtn");
    const fileInput = $("fileInput"), footer = $("footer"), slider = $("slider");
    const pageNo = $("pageNo"), docTitle = $("docTitle"), docSub = $("docSub");
    const welcome = $("welcome"), spinner = $("spinner"), toast = $("toast");
    const themeBtn = $("themeBtn");

    // ---- Reading themes (global, not per-book) ----
    const THEME_KEY = "resumereader:theme";
    const THEMES = ["dark", "sepia", "night"];
    const THEME_LABEL = { dark: "Default", sepia: "Sepia", night: "Night" };
    function currentTheme() {
      try { return localStorage.getItem(THEME_KEY) || "dark"; } catch (e) { return "dark"; }
    }
    function applyTheme(name) {
      if (THEMES.indexOf(name) < 0) name = "dark";
      if (name === "dark") document.body.removeAttribute("data-theme");
      else document.body.setAttribute("data-theme", name);
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) {
        const bar = getComputedStyle(document.body).getPropertyValue("--bar").trim();
        if (bar) meta.setAttribute("content", bar);
      }
      try { localStorage.setItem(THEME_KEY, name); } catch (e) {}
    }
    applyTheme(currentTheme());

    // ---- State ----
    let pdfDoc = null;
    let pageCount = 0;
    let currentPage = 1;
    let zoom = 1;            // user zoom multiplier on top of fit-width
    let fitWidth = true;
    let mode = "page";       // "page" (fixed render) | "reflow" (wrapping text)
    let fontSize = 1.05;     // rem, used in reflow mode
    let fileKey = null;
    let fileName = "";
    let rendering = false;
    let pendingPage = null;  // queued page if a render is in flight
    let restoreScrollFrac = null;

    const POS_PREFIX = "resumereader:pos:";
    const LAST_KEY   = "resumereader:last";

    // ---- IndexedDB: cache the PDF bytes so it auto-opens next time ----
    const IDB_NAME = "resumereader", IDB_STORE = "books";
    let idbPromise = null;
    function idb() {
      if (idbPromise) return idbPromise;
      idbPromise = new Promise(function (resolve, reject) {
        if (!window.indexedDB) return reject(new Error("no indexedDB"));
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = function () {
          req.result.createObjectStore(IDB_STORE, { keyPath: "key" });
        };
        req.onsuccess = function () { resolve(req.result); };
        req.onerror = function () { reject(req.error); };
      });
      return idbPromise;
    }
    function idbTx(db, mode) { return db.transaction(IDB_STORE, mode).objectStore(IDB_STORE); }
    async function idbPutBook(key, name, buf) {
      try {
        const db = await idb();
        await new Promise(function (res, rej) {
          const r = idbTx(db, "readwrite").put({ key: key, name: name, data: buf, t: nowStamp() });
          r.onsuccess = res; r.onerror = function () { rej(r.error); };
        });
        return true;
      } catch (e) { return false; }
    }
    async function idbGetBook(key) {
      try {
        const db = await idb();
        return await new Promise(function (res, rej) {
          const r = idbTx(db, "readonly").get(key);
          r.onsuccess = function () { res(r.result || null); };
          r.onerror = function () { rej(r.error); };
        });
      } catch (e) { return null; }
    }

    // ---- Persistence ----
    function loadPos(key) {
      try { return JSON.parse(localStorage.getItem(POS_PREFIX + key) || "null"); }
      catch (e) { return null; }
    }
    function savePos() {
      if (!fileKey || !pageCount) return;
      const max = viewer.scrollHeight - viewer.clientHeight;
      const frac = max > 0 ? viewer.scrollTop / max : 0;
      const data = { page: currentPage, scrollFrac: frac, total: pageCount, zoom, fitWidth, mode, fontSize, name: fileName, t: nowStamp() };
      try {
        localStorage.setItem(POS_PREFIX + fileKey, JSON.stringify(data));
        localStorage.setItem(LAST_KEY, JSON.stringify({ key: fileKey, name: fileName, page: currentPage, total: pageCount }));
      } catch (e) {}
    }
    // Date.now via performance fallback (avoids issues in restricted contexts)
    function nowStamp() { try { return Date.now(); } catch (e) { return 0; } }

    const saveDebounced = debounce(savePos, 400);
    function debounce(fn, ms) {
      let h; return function () { clearTimeout(h); h = setTimeout(fn, ms); };
    }

    // ---- Rendering (dispatcher) ----
    function renderPage(num) {
      if (!pdfDoc) return;
      num = Math.min(Math.max(1, num | 0), pageCount);
      if (rendering) { pendingPage = num; return; }
      rendering = true;
      currentPage = num;
      const job = (mode === "reflow") ? renderReflow(num) : renderCanvas(num);
      job.then(finishRender).catch(function (e) { console.error(e); finishRender(); });
    }

    function finishRender() {
      updateChrome();
      // restore intra-page scroll if we just jumped to a remembered spot
      if (restoreScrollFrac != null) {
        const max = viewer.scrollHeight - viewer.clientHeight;
        viewer.scrollTop = max * restoreScrollFrac;
        restoreScrollFrac = null;
      } else {
        viewer.scrollTop = 0;
      }
      rendering = false;
      if (pendingPage != null && pendingPage !== currentPage) {
        const p = pendingPage; pendingPage = null; renderPage(p);
      } else {
        pendingPage = null;
        savePos();
      }
    }

    // ---- Fixed-layout (canvas) render ----
    async function renderCanvas(num) {
      pageHost.classList.remove("hidden");
      reflowHost.classList.add("hidden");
      const page = await pdfDoc.getPage(num);
      const base = page.getViewport({ scale: 1 });
      const avail = viewer.clientWidth - 24; // padding allowance
      const fitScale = avail / base.width;
      const scale = fitScale * zoom;
      const dpr = Math.min(window.devicePixelRatio || 1, 3);
      const viewport = page.getViewport({ scale });

      canvas.width = Math.floor(viewport.width * dpr);
      canvas.height = Math.floor(viewport.height * dpr);
      canvas.style.width = Math.floor(viewport.width) + "px";
      canvas.style.height = Math.floor(viewport.height) + "px";

      await page.render({
        canvasContext: ctx,
        viewport,
        transform: dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null,
      }).promise;
    }

    // ---- Reflow (wrapping text) render ----
    async function renderReflow(num) {
      pageHost.classList.add("hidden");
      reflowHost.classList.remove("hidden");
      reflowHost.style.fontSize = fontSize + "rem";
      const page = await pdfDoc.getPage(num);
      const tc = await page.getTextContent();
      const paras = buildParagraphs(tc);

      reflowHost.innerHTML = "";
      if (!paras.length) {
        const p = document.createElement("p");
        p.className = "reflow-note";
        p.textContent = "No selectable text on this page — it may be a scanned image. Tap ¶ to return to page view.";
        reflowHost.appendChild(p);
        return;
      }
      for (const para of paras) {
        const p = document.createElement("p");
        if (para.heading) p.className = "heading";
        p.textContent = para.text;
        reflowHost.appendChild(p);
      }
      const note = document.createElement("div");
      note.className = "reflow-note";
      note.textContent = "Reflowed text · page " + num + " · tap ¶ for the exact original layout";
      reflowHost.appendChild(note);
    }

    // Reconstruct flowing paragraphs from PDF text items (best-effort for prose).
    function buildParagraphs(tc) {
      const items = (tc.items || []).filter(function (it) { return it && typeof it.str === "string"; });
      if (!items.length) return [];

      const lines = [];
      let cur = null, lastY = null, lastXEnd = null;
      const heights = [];
      for (const it of items) {
        const tr = it.transform || [1, 0, 0, 1, 0, 0];
        const x = tr[4], y = tr[5];
        const h = it.height || Math.abs(tr[3]) || 10;
        heights.push(h);
        const newLine = lastY === null || Math.abs(y - lastY) > h * 0.6;
        if (newLine) {
          if (cur) lines.push(cur);
          cur = { y: y, h: h, x: x, text: "" };
        } else if (lastXEnd !== null && x - lastXEnd > h * 0.4 && cur.text && !/\s$/.test(cur.text)) {
          cur.text += " ";
        }
        cur.text += it.str;
        lastY = y;
        lastXEnd = x + (it.width || 0);
      }
      if (cur) lines.push(cur);

      const clean = lines
        .map(function (l) { l.text = l.text.replace(/\s+/g, " ").trim(); return l; })
        .filter(function (l) { return l.text.length; });
      if (!clean.length) return [];

      heights.sort(function (a, b) { return a - b; });
      const medH = heights[Math.floor(heights.length / 2)] || 10;

      const paras = [];
      let buf = "";
      const flush = function () { if (buf) { paras.push({ text: buf }); buf = ""; } };
      for (let i = 0; i < clean.length; i++) {
        const l = clean[i], prev = clean[i - 1];
        if (l.h > medH * 1.4) {                 // larger text → heading
          flush();
          paras.push({ text: l.text, heading: true });
          continue;
        }
        let brk = false;
        if (prev) {
          const gap = Math.abs(prev.y - l.y);
          if (gap > medH * 1.8) brk = true;                          // blank-ish gap
          else if (l.x - prev.x > medH * 1.2) brk = true;            // indented first line
          else if (gap > medH * 1.3 && /[.!?”"’']\s*$/.test(prev.text)) brk = true;
        }
        if (brk) flush();
        if (buf) {
          if (/[A-Za-z]-$/.test(buf)) buf = buf.replace(/-$/, "") + l.text; // de-hyphenate
          else buf += " " + l.text;
        } else {
          buf = l.text;
        }
      }
      flush();
      return paras;
    }

    function updateChrome() {
      slider.max = String(pageCount);
      slider.value = String(currentPage);
      const pct = pageCount ? Math.round((currentPage / pageCount) * 100) : 0;
      pageNo.textContent = currentPage + " / " + pageCount + "  ·  " + pct + "%";
    }

    function go(delta) { renderPage(currentPage + delta); }

    // ---- File loading ----
    // Picked from the file picker: cache the bytes, then open.
    async function openFile(file) {
      if (!file) return;
      const key = [file.name, file.size, file.lastModified].join(":");
      welcome.classList.add("hidden");
      spinner.style.display = "block";
      docSub.textContent = "loading…";
      const buf = await file.arrayBuffer();
      await idbPutBook(key, file.name, buf);          // cache before getDocument detaches the buffer
      await loadDocument(file.name, key, buf, true);
    }

    // Auto-resume: open straight from the cached bytes, no picking.
    async function openFromCache(rec) {
      welcome.classList.add("hidden");
      spinner.style.display = "block";
      docSub.textContent = "resuming…";
      await loadDocument(rec.name, rec.key, rec.data, false);
    }

    async function loadDocument(name, key, buf, isNew) {
      fileName = name;
      fileKey = key;
      docTitle.firstChild.nodeValue = name;
      try {
        pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
      } catch (e) {
        spinner.style.display = "none";
        docSub.textContent = "could not open this PDF";
        showToast("Couldn't open that file");
        welcome.classList.remove("hidden");
        return;
      }
      pageCount = pdfDoc.numPages;
      footer.classList.remove("hidden");
      spinner.style.display = "none";

      const saved = loadPos(fileKey);
      let startPage = 1;
      if (saved) {
        startPage = Math.min(saved.page || 1, pageCount);
        zoom = saved.zoom || 1;
        fitWidth = saved.fitWidth !== false;
        mode = saved.mode === "reflow" ? "reflow" : "page";
        fontSize = saved.fontSize || 1.05;
        restoreScrollFrac = typeof saved.scrollFrac === "number" ? saved.scrollFrac : null;
      }
      reflowBtn.classList.toggle("active", mode === "reflow");
      docSub.textContent = pageCount + " pages";
      await renderPage(startPage);
      if (saved && startPage > 1) showToast((isNew ? "Resumed at page " : "Welcome back — page ") + startPage);
    }

    // ---- Startup: auto-open the last book if we have it cached ----
    async function tryAutoResume() {
      let last; try { last = JSON.parse(localStorage.getItem(LAST_KEY) || "null"); } catch (e) {}
      if (!last || !last.key) return;
      const rec = await idbGetBook(last.key);
      if (rec && rec.data) { await openFromCache(rec); return; }
      // Bytes not cached (e.g. opened before caching existed, or storage cleared): show a hint.
      $("resumeName").textContent = last.name;
      $("resumeWhere").textContent = "Page " + last.page + " of " + last.total +
        " · tap “Open a PDF” and choose this file again";
      $("resumeCard").style.display = "block";
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast._h);
      showToast._h = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    // ---- Events ----
    $("openBtn").onclick = () => fileInput.click();
    $("welcomeOpen").onclick = () => fileInput.click();
    fileInput.onchange = (e) => { if (e.target.files[0]) openFile(e.target.files[0]); };

    // Tap the left/right edge of the screen to flip pages. Position is checked
    // against the viewport on click, so it works anywhere on a tall (landscape)
    // page regardless of how far you've scrolled. The middle is left free for
    // scrolling and selecting text.
    viewer.addEventListener("click", (e) => {
      if (!pdfDoc) return;
      const sel = window.getSelection && window.getSelection();
      if (sel && String(sel).length) return;            // don't flip while selecting text
      const w = window.innerWidth || document.documentElement.clientWidth;
      if (e.clientX < w * 0.28) go(-1);
      else if (e.clientX > w * 0.72) go(1);
    });
    slider.oninput = () => { renderPage(parseInt(slider.value, 10)); };

    themeBtn.onclick = () => {
      const next = THEMES[(THEMES.indexOf(currentTheme()) + 1) % THEMES.length];
      applyTheme(next);
      showToast(THEME_LABEL[next] + " theme");
    };

    $("zoomIn").onclick = () => {
      if (mode === "reflow") { fontSize = Math.min(fontSize * 1.12, 2.6); }
      else { fitWidth = false; zoom = Math.min(zoom * 1.25, 5); }
      renderPage(currentPage);
    };
    $("zoomOut").onclick = () => {
      if (mode === "reflow") { fontSize = Math.max(fontSize / 1.12, 0.7); }
      else { zoom = Math.max(zoom / 1.25, 0.5); if (zoom <= 1) zoom = 1; }
      renderPage(currentPage);
    };
    $("fitBtn").onclick = () => {
      if (mode === "reflow") { fontSize = 1.05; }
      else { fitWidth = true; zoom = 1; }
      renderPage(currentPage);
    };
    reflowBtn.onclick = () => {
      mode = mode === "reflow" ? "page" : "reflow";
      reflowBtn.classList.toggle("active", mode === "reflow");
      restoreScrollFrac = null; // land at top of the page in the new mode
      showToast(mode === "reflow" ? "Reflow on — text now wraps when you zoom" : "Original page layout");
      renderPage(currentPage);
    };

    document.addEventListener("keydown", (e) => {
      if (!pdfDoc) return;
      if (e.key === "ArrowRight" || e.key === "PageDown") { go(1); e.preventDefault(); }
      else if (e.key === "ArrowLeft" || e.key === "PageUp") { go(-1); e.preventDefault(); }
      else if (e.key === "Home") { renderPage(1); }
      else if (e.key === "End") { renderPage(pageCount); }
    });

    // swipe (horizontal) to flip pages
    let touchX = null, touchY = null;
    viewer.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; }
    }, { passive: true });
    viewer.addEventListener("touchend", (e) => {
      if (touchX == null) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchX, dy = t.clientY - touchY;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.6) { go(dx < 0 ? 1 : -1); }
      touchX = touchY = null;
    }, { passive: true });

    viewer.addEventListener("scroll", saveDebounced, { passive: true });
    window.addEventListener("beforeunload", savePos);
    document.addEventListener("visibilitychange", () => { if (document.hidden) savePos(); });

    // re-render on resize / rotate, preserving spot
    let rsz;
    window.addEventListener("resize", () => {
      if (!pdfDoc) return;
      clearTimeout(rsz);
      const max = viewer.scrollHeight - viewer.clientHeight;
      restoreScrollFrac = max > 0 ? viewer.scrollTop / max : 0;
      rsz = setTimeout(() => renderPage(currentPage), 200);
    });

    tryAutoResume();
  })();
  </script>
</body>
</html>
